<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trust and Pi Guide - Step 10</title>
    <script src="https://sdk.minepi.com/pi-sdk.js?v=3"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 40px; border-radius: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; width: 80%; }
        h1 { color: #5e2d91; font-size: 24px; }
        p { color: #555; margin-bottom: 30px; }
        .pay-btn { background-color: #000; color: #fff; border: 2px solid #ffd700; padding: 15px 30px; font-size: 18px; border-radius: 12px; cursor: pointer; width: 100%; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>تفعيل مشروع ثقة ودليل الباي</h1>
    <p>اضغطي على الزر بالأسفل لفتح المحفظة وإتمام الخطوة 10.</p>
    <button class="pay-btn" onclick="startPayment()">دفع 0.1 Pi (شبكة الفحص)</button>
</div>

<script>
    const Pi = window.Pi;
    Pi.init({ version: "2.0", sandbox: true });

    async function startPayment() {
        try {
            const payment = await Pi.createPayment({
                amount: 0.1,
                memo: "Final Test Step 10",
                metadata: { project: "TrustAndPi" }
            }, {
                onReadyForServerApproval: (paymentId) => {
                    console.log("Approved ID:", paymentId);
                },
                onReadyForServerCompletion: (paymentId, txid) => {
                    alert("تهانينا! تم التفعيل بنجاح.");
                },
                onCancel: (paymentId) => {
                    console.log("User cancelled payment");
                },
                onError: (error, payment) => {
                    console.error("Payment Error:", error);
                    alert("تأكدي من فتح محفظة Testnet أولاً.");
                }
            });
        } catch (err) {
            alert("يرجى التأكد من الدخول عبر زر Start في قائمة المهام (Checklist)");
        }
    }
</script>

</body>
</html>
